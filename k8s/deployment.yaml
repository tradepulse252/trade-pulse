apiVersion: v1
kind: Namespace
metadata:
  name: tradepulse
---
apiVersion: v1
kind: Secret
metadata:
  name: tradepulse-secrets
  namespace: tradepulse
type: Opaque
stringData:
  DATABASE_URL: "postgresql://tradepulse:CHANGE_ME@postgres:5432/tradepulse?schema=public"
  JWT_SECRET: "CHANGE_ME_TO_RANDOM_64_CHAR_STRING"
  POSTGRES_PASSWORD: "CHANGE_ME"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tradepulse-config
  namespace: tradepulse
data:
  REDIS_URL: "redis://redis:6379"
  CORS_ORIGIN: "https://tradepulse.example.com"
  MIN_VOLUME_USDT: "1000000"
  MIN_OPEN_INTEREST_USDT: "500000"
  SCORING_INTERVAL_MS: "5000"
  OI_REFRESH_INTERVAL_MS: "60000"
  NEXT_PUBLIC_API_URL: "https://tradepulse.example.com"
  NEXT_PUBLIC_WS_URL: "wss://tradepulse.example.com"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: tradepulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: tradepulse
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tradepulse-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: tradepulse
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: tradepulse
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: tradepulse
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: tradepulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: tradepulse
spec:
  selector:
    app: redis
  ports:
    - port: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: tradepulse
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: tradepulse-backend:latest
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: tradepulse-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tradepulse-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tradepulse-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: tradepulse
spec:
  selector:
    app: backend
  ports:
    - port: 4000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: tradepulse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: tradepulse-frontend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: tradepulse-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: tradepulse
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tradepulse-ingress
  namespace: tradepulse
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
    nginx.ingress.kubernetes.io/websocket-services: "backend"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - tradepulse.example.com
      secretName: tradepulse-tls
  rules:
    - host: tradepulse.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 4000
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: tradepulse
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
