# Render Blueprint — Trade-Pulse Backend (Free Tier)
# Deploy: Render Dashboard → New → Blueprint → connect GitHub repo

services:
  - type: web
    name: tradepulse-api
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FIREBASE_PROJECT_ID
        value: muchocoffee-tradepulse252
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIRESTORE_DATABASE_ID
        value: "(default)"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://frontend-omega-two-31.vercel.app
      - key: FRONTEND_URL
        value: https://frontend-omega-two-31.vercel.app
      - key: EMAIL_USE_SMTP
        value: "false"
      - key: PERSIST_MARKET_DATA
        value: "false"
      - key: AGGREGATION_REFRESH_MS
        value: "90000"
      - key: BINANCE_REST_FALLBACK_MS
        value: "120000"
      - key: BINANCE_ENABLE_OI_BATCH
        value: "false"
      - key: BINANCE_REST_BASE
        value: https://fapi.binance.com
      - key: BINANCE_WS_BASE
        value: wss://fstream.binance.com
      - key: MIN_VOLUME_USDT
        value: "1000000"
      - key: MIN_OPEN_INTEREST_USDT
        value: "500000"
      - key: SCORING_INTERVAL_MS
        value: "10000"
      - key: OI_REFRESH_INTERVAL_MS
        value: "300000"
      - key: REDIS_URL
        sync: false
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_ADDRESS
        sync: false
