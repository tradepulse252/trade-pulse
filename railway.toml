# Root Railway config for monorepo GitHub deploys (Root Directory = /).
# If Root Directory is /backend, use /backend/railway.toml instead.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["backend/**"]

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
